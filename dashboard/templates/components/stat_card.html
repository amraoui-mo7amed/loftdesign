<div class="col-xl-3 col-md-6 mb-4">
    <div class="card h-100 border-0 shadow-sm stat-card-new p-2">
        <div class="card-body position-relative z-index-1">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div class="icon-shape bg-{{ color|default:'primary' }}-soft text-{{ color|default:'primary' }}">
                    <i class="fas {{ icon }} fa-lg"></i>
                </div>
                {% if trend %}
                <div class="trend-indicator text-{{ trend_color|default:'success' }} small fw-bold">
                    <i class="fas fa-arrow-{{ trend_dir|default:'up' }} me-1"></i> {{ trend }}%
                </div>
                {% else %}
                <div class="text-muted opacity-25">
                    <i class="fas fa-chart-line"></i>
                </div>
                {% endif %}
            </div>
            <div>
                <h6 class="text-muted small text-uppercase fw-black mb-1" style="letter-spacing: 1px;">{{ title }}</h6>
                <h3 class="mb-0 fw-black text-dark">{{ value }}</h3>
            </div>
        </div>
    </div>
</div>
