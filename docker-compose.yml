services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-loftdesign}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-loftdesign}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    networks:
      - app-network

  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - APP_SECRET=${APP_SECRET:-django-insecure-change-me}
      - APP_ALLOWED_HOSTS=localhost,127.0.0.1,194.164.72.208,loft-design.bilnov.com
      - DB_NAME=${DB_NAME:-loftdesign}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - mediafiles:/app/media
      - staticfiles:/app/staticfiles
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - staticfiles:/app/staticfiles:ro
      - mediafiles:/app/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - app-network
    # Inline nginx config using command
    command: >
      sh -c '
      mkdir -p /etc/nginx/conf.d &&
      cat > /etc/nginx/conf.d/default.conf << "NGINXEOF"
      upstream web {
          server web:8000;
      }

      server {
          listen 80;
          server_name loft-design.bilnov.com;

          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location / {
              return 301 https://$$host$$request_uri;
          }
      }

      server {
          listen 443 ssl http2;
          server_name loft-design.bilnov.com;

          ssl_certificate /etc/letsencrypt/live/loft-design.bilnov.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/loft-design.bilnov.com/privkey.pem;

          client_max_body_size 100M;

          location /static/ {
              alias /app/staticfiles/;
              expires 30d;
              add_header Cache-Control "public, immutable";
              access_log off;
          }

          location /media/ {
              alias /app/media/;
              expires 7d;
              add_header Cache-Control "public";
              access_log off;
          }

          location / {
              proxy_pass http://web;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 300s;
              proxy_connect_timeout 75s;
          }
      }
      NGINXEOF
      nginx -g "daemon off;"
      '

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - app-network

volumes:
  postgres_data:
  mediafiles:
  staticfiles:
  certbot_conf:
  certbot_www:

networks:
  app-network:
    driver: bridge